name: Supabase Heartbeat

on:
  schedule:
    - cron: "17 3 * * 1,4"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run heartbeat
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_HEARTBEAT_TABLE: ${{ secrets.SUPABASE_HEARTBEAT_TABLE }}
          SUPABASE_HEARTBEAT_COLUMN: ${{ secrets.SUPABASE_HEARTBEAT_COLUMN }}
        run: node scripts/supabase-heartbeat.js
